<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work Calendar</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2693/2693507.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2693/2693507.png">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root { --primary: #4f46e5; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --accent: #059669; --border: #e2e8f0; --danger: #ef4444; }
        body.dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; visibility: hidden; padding-top: env(safe-area-inset-top); }
        
        .container { background: var(--card); padding: 1.2rem; border-radius: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; box-sizing: border-box; }
        
        .nav-tabs { display: flex; gap: 8px; width: 100%; max-width: 500px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #94a3b8; color: white; font-weight: bold; opacity: 0.6; }
        .tab-btn.active { opacity: 1; background: var(--primary); }

        .view { display: none; }
        .view.active { display: block; }

        .row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
        select, input { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.9rem; flex-grow: 1; }
        
        button { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-mode { background: #94a3b8; color: white; flex: 1; opacity: 0.4; font-size: 0.75rem; }
        .btn-mode.active { opacity: 1; background: var(--primary); }
        
        .week-block { border-radius: 8px; margin-bottom: 20px; padding: 12px; background: var(--card); border: 1px solid var(--border); border-left: 5px solid var(--primary); }
        .week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; color: var(--primary); font-size: 0.85rem; }
        
        .day-row { display: grid; grid-template-columns: 35px 1fr 1fr 45px 55px 25px; gap: 4px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .drag-handle { cursor: grab; color: #cbd5e1; font-size: 1.1rem; text-align: center; }

        .footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 3px solid var(--primary); }
        .stat-row { display: flex; justify-content: space-between; font-size: 1.1rem; margin-bottom: 5px; }
        .add-btn { width: 100%; margin-top: 10px; padding: 15px; font-size: 1rem; border-radius: 8px; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" id="nav-tracker" onclick="showView('main')">Tracker</button>
    <button class="tab-btn" id="nav-settings" onclick="showView('settings')">Settings</button>
    <button onclick="toggleDark()" style="background:none; font-size:1.2rem;">🌓</button>
</div>

<div class="container">
    <div id="view-main" class="view active">
        <div class="row">
            <select id="jobSelect" onchange="switchJob(this.value)"></select>
            <button class="btn-primary" onclick="addJob()">+ Job</button>
        </div>
        <div class="row">
            <button id="mode-weekly" class="btn-mode" onclick="setMode('weekly')">Ugentlig</button>
            <button id="mode-custom" class="btn-mode" onclick="setMode('custom')">Liste</button>
        </div>
        <div class="row">
            <select id="currencySelect" style="max-width:70px;" onchange="updateSet('currency', this.value)">
                <option value="kr">kr</option><option value="$">$</option><option value="€">€</option>
            </select>
            <input type="number" id="wageInput" placeholder="Løn" oninput="updateSet('wage', this.value)">
        </div>

        <div id="list-container"></div>
        
        <button id="add-week-btn" class="add-btn" style="background:var(--primary); display:none;" onclick="addNewWeek()">+ Uge</button>
        <button id="add-day-btn" class="add-btn" style="background:var(--accent); display:none;" onclick="addCustomRow()">+ Dag</button>

        <div class="footer">
            <div class="stat-row"><b id="lbl-total">Total:</b> <span id="totalTime">0h</span></div>
            <div class="stat-row"><b id="lbl-pay">Løn:</b> <span id="totalPay">0 kr</span></div>
        </div>
        <button onclick="deleteCurrentJob()" style="background:none; color:var(--danger); width:100%; margin-top:20px; font-size:0.7rem; opacity:0.5;" id="lbl-deljob">Slet Job</button>
    </div>

    <div id="view-settings" class="view">
        <h3 id="lbl-settings">Indstillinger</h3>
        
        <label id="lbl-lang">Sprog / Language:</label>
        <select onchange="updateSet('lang', this.value)" id="langSelect" style="width:100%; margin-bottom:20px;">
            <option value="da">Dansk</option>
            <option value="en">English</option>
        </select>

        <label id="lbl-users">Brugerprofiler:</label>
        <div id="user-list" style="margin-top:10px;"></div>
        <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="addUser()">+ Ny Bruger</button>

        <hr style="margin:20px 0;">
        <button onclick="exportJSON()" style="width:100%; background:#059669; color:white; margin-bottom:10px;">💾 Backup</button>
        <button onclick="document.getElementById('importFile').click()" style="width:100%; background:#d97706; color:white;">🔄 Gendan Data</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importJSON(event)">
    </div>
</div>

<script>
    const PASS = "123"; 
    const CONFIG_KEY = 'WT_CONFIG_V13';
    
    const i18n = {
        da: { tracker: "Kalender", settings: "Indstillinger", lang: "Sprog", total: "Total:", pay: "Løn:", deljob: "Slet Job", addWeek: "+ Ny Uge", addDay: "+ Ny Dag", users: "Brugere", weekLabel: "Uge:" },
        en: { tracker: "Tracker", settings: "Settings", lang: "Language", total: "Total:", pay: "Pay:", deljob: "Delete Job", addWeek: "+ New Week", addDay: "+ New Day", users: "Users", weekLabel: "Week:" }
    };

    let config = JSON.parse(localStorage.getItem(CONFIG_KEY)) || { lang: 'da', currentUser: 'Default', darkMode: false, users: ['Default'] };
    let userData;

    function init() {
        if (sessionStorage.getItem('WT_AUTH') !== 'true') {
            const p = prompt("Password:");
            if (p === PASS) { sessionStorage.setItem('WT_AUTH', 'true'); }
            else { window.location.reload(); }
        }
        document.body.style.visibility = "visible";
        loadUser();
    }

    function loadUser() {
        const dataKey = `WT_DATA_${config.currentUser}`;
        userData = JSON.parse(localStorage.getItem(dataKey)) || {
            jobs: { "Job 1": { mode: 'weekly', wage: 0, currency: 'kr', weeks: [], custom: [] } },
            currentJob: "Job 1"
        };
        render();
    }

    function save() {
        localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
        localStorage.setItem(`WT_DATA_${config.currentUser}`, JSON.stringify(userData));
        render();
    }

    function render() {
        document.body.className = config.darkMode ? 'dark' : '';
        const L = i18n[config.lang];
        const job = userData.jobs[userData.currentJob] || Object.values(userData.jobs)[0];
        
        // Update UI Labels
        document.getElementById('nav-tracker').innerText = L.tracker;
        document.getElementById('nav-settings').innerText = L.settings;
        document.getElementById('lbl-settings').innerText = L.settings;
        document.getElementById('lbl-lang').innerText = L.lang;
        document.getElementById('lbl-total').innerText = L.total;
        document.getElementById('lbl-pay').innerText = L.pay;
        document.getElementById('lbl-deljob').innerText = L.deljob;
        document.getElementById('add-week-btn').innerText = L.addWeek;
        document.getElementById('add-day-btn').innerText = L.addDay;
        document.getElementById('langSelect').value = config.lang;

        const sel = document.getElementById('jobSelect');
        sel.innerHTML = '';
        Object.keys(userData.jobs).forEach(name => {
            sel.innerHTML += `<option value="${name}" ${name===userData.currentJob?'selected':''}>${name}</option>`;
        });

        document.getElementById('wageInput').value = job.wage;
        document.getElementById('currencySelect').value = job.currency || 'kr';
        document.getElementById('mode-weekly').className = `btn-mode ${job.mode==='weekly'?'active':''}`;
        document.getElementById('mode-custom').className = `btn-mode ${job.mode==='custom'?'active':''}`;
        document.getElementById('add-week-btn').style.display = job.mode==='weekly'?'block':'none';
        document.getElementById('add-day-btn').style.display = job.mode==='custom'?'block':'none';

        const uList = document.getElementById('user-list');
        uList.innerHTML = '';
        config.users.forEach(u => {
            uList.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--card);"><span>${u}</span><button onclick="switchUser('${u}')" class="${u===config.currentUser?'btn-primary':''}" style="padding:4px 10px;">${u===config.currentUser?'Aktiv':'Skift'}</button></div>`;
        });

        const list = document.getElementById('list-container');
        list.innerHTML = '';
        let totalMin = 0;

        if(job.mode === 'weekly') {
            job.weeks.forEach((week, wi) => {
                let h = `<div class="week-block">
                    <div class="week-header"><b>${L.weekLabel} ${week.start}</b><button onclick="deleteWeek(${wi})" style="color:red; background:none;">X</button></div>`;
                week.days.forEach((day, di) => {
                    let m = calc(day.s, day.e, day.b); totalMin += m;
                    h += `<div class="day-row" style="grid-template-columns: 40px 1fr 1fr 45px 60px;">
                        <span style="font-size:0.7rem; font-weight:bold;">${day.d}</span>
                        <input type="time" value="${day.s}" oninput="upd(${wi},${di},'s',this.value)">
                        <input type="time" value="${day.e}" oninput="upd(${wi},${di},'e',this.value)">
                        <input type="number" value="${day.b}" oninput="upd(${wi},${di},'b',this.value)">
                        <span style="font-size:0.75rem; font-weight:bold; text-align:right;">${(m/60).toFixed(2)}h</span>
                    </div>`;
                });
                list.innerHTML += h + `</div>`;
            });
        } else {
            job.custom.forEach((entry, i) => {
                let m = calc(entry.s, entry.e, entry.b); totalMin += m;
                list.innerHTML += `<div class="day-row" style="grid-template-columns: 30px 1fr 1.2fr 1.2fr 45px 60px 30px;">
                    <div class="drag-handle">≡</div>
                    <input type="date" value="${entry.dt}" oninput="updC(${i},'dt',this.value)">
                    <input type="time" value="${entry.s}" oninput="updC(${i},'s',this.value)">
                    <input type="time" value="${entry.e}" oninput="updC(${i},'e',this.value)">
                    <input type="number" value="${entry.b}" oninput="updC(${i},'b',this.value)">
                    <span style="font-size:0.75rem; font-weight:bold;">${(m/60).toFixed(2)}h</span>
                    <button onclick="deleteDay(${i})" style="color:red; background:none;">X</button>
                </div>`;
            });
            Sortable.create(list, { handle:'.drag-handle', animation:150, onEnd:(e)=>{
                const c = userData.jobs[userData.currentJob].custom;
                const item = c.splice(e.oldIndex, 1)[0];
                c.splice(e.newIndex, 0, item); save();
            }});
        }
        document.getElementById('totalTime').innerText = Math.floor(totalMin/60) + "h " + (totalMin%60) + "m";
        document.getElementById('totalPay').innerText = ((totalMin/60)*job.wage).toFixed(2) + " " + (job.currency||'kr');
    }

    function calc(s,e,b) {
        if(!s || !e) return 0;
        let [sh,sm] = s.split(':').map(Number); let [eh,em] = e.split(':').map(Number);
        let start = sh*60+sm; let end = eh*60+em; if(end<start) end+=1440;
        return Math.max(0, (end-start)-(b||0));
    }

    function upd(wi, di, f, v) { userData.jobs[userData.currentJob].weeks[wi].days[di][f] = (f==='b')?parseInt(v)||0:v; save(); }
    function updC(i, f, v) { userData.jobs[userData.currentJob].custom[i][f] = (f==='b')?parseInt(v)||0:v; save(); }
    function setMode(m) { userData.jobs[userData.currentJob].mode = m; save(); }
    function switchJob(n) { userData.currentJob = n; save(); }
    function addJob() { let n = prompt("Nyt job:"); if(n && !userData.jobs[n]) { userData.jobs[n] = { mode:'weekly', wage:0, currency:'kr', weeks:[], custom:[] }; userData.currentJob = n; save(); } }
    function deleteCurrentJob() { if(confirm("Slet job?")) { delete userData.jobs[userData.currentJob]; userData.currentJob = Object.keys(userData.jobs)[0] || "Job 1"; if(!userData.jobs[userData.currentJob]) userData.jobs["Job 1"] = { mode:'weekly', wage:0, currency:'kr', weeks:[], custom:[] }; save(); } }
    function addNewWeek() { let d = prompt("Startdato:", new Date().toISOString().split('T')[0]); if(d) { userData.jobs[userData.currentJob].weeks.unshift({ start: d, days: ['Man','Tir','Ons','Tor','Fre','Lør','Søn'].map(name => ({d: name, s:'', e:'', b:0})) }); save(); } }
    function addCustomRow() { userData.jobs[userData.currentJob].custom.push({dt: new Date().toISOString().split('T')[0], s:'', e:'', b:0}); save(); }
    function deleteWeek(i) { if(confirm("Slet uge?")) { userData.jobs[userData.currentJob].weeks.splice(i,1); save(); } }
    function deleteDay(i) { if(confirm("Slet dag?")) { userData.jobs[userData.currentJob].custom.splice(i,1); save(); } }
    function switchUser(u) { config.currentUser = u; loadUser(); }
    function addUser() { let n = prompt("Brugernavn:"); if(n && !config.users.includes(n)) { config.users.push(n); config.currentUser = n; save(); } }
    function showView(v) { document.querySelectorAll('.view').forEach(el => el.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(`view-${v}`).classList.add('active'); document.getElementById(`nav-${v}`).classList.add('active'); }
    function updateSet(k, v) { if(k === 'lang') config.lang = v; if(k === 'wage') userData.jobs[userData.currentJob].wage = parseFloat(v) || 0; if(k === 'currency') userData.jobs[userData.currentJob].currency = v; save(); }
    function toggleDark() { config.darkMode = !config.darkMode; save(); }
    function exportJSON() { const blob = new Blob([JSON.stringify({config, userData})], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `WorkTracker_Backup.json`; a.click(); }
    function importJSON(ev) { const r = new FileReader(); r.onload = (e) => { const d = JSON.parse(e.target.result); if(d.userData) { userData = d.userData; if(d.config) config = d.config; save(); location.reload(); } }; r.readAsText(ev.target.files[0]); }

    init();
</script>
</body>
</html>
