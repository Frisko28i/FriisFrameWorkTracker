<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTracker Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2618/2618469.png">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5; --bg: #f1f5f9; --card: #ffffff; 
            --text: #1e293b; --accent: #059669; --border: #e2e8f0;
        }
        body.dark {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155;
        }
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; 
            transition: 0.3s; visibility: hidden; padding-top: env(safe-area-inset-top);
        }
        
        .header-box { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .row { display: flex; gap: 5px; align-items: center; width: 100%; }
        
        select, input { padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.85rem; background: var(--card); color: var(--text); outline: none; }
        select { flex-grow: 1; }
        .wage-input { width: 70px; }
        .currency-select { width: 60px; }

        button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-job { background: var(--primary); color: white; }
        .btn-mode { background: #94a3b8; color: white; flex: 1; opacity: 0.5; }
        .btn-mode.active { opacity: 1; background: var(--primary); }
        .btn-dark { background: #334155; color: white; }

        .container { background: var(--card); padding: 1rem; border-radius: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; box-sizing: border-box; }
        
        .labels { display: grid; grid-template-columns: 30px 85px 1fr 1fr 45px 55px 25px; gap: 4px; font-size: 0.5rem; font-weight: bold; color: #64748b; margin-bottom: 5px; text-align: center; }

        .week-block { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; padding: 8px; background: rgba(0,0,0,0.02); }
        .day-row { display: grid; grid-template-columns: 30px 85px 1fr 1fr 45px 55px 25px; gap: 4px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .drag-handle { cursor: grab; color: #cbd5e1; font-size: 1.1rem; text-align: center; }
        
        input[type="time"], input[type="number"], input[type="date"] { width: 100%; padding: 4px; font-size: 0.75rem; text-align: center; border: 1px solid var(--border); border-radius: 4px; }
        .day-total { font-weight: bold; color: var(--primary); font-size: 0.75rem; text-align: right; }
        
        .footer { margin-top: 1rem; padding-top: 1rem; border-top: 3px solid var(--primary); }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .grand-total { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
        .remove-btn { color: #ef4444; background: none; font-size: 1.1rem; border: none; }
        
        .add-btn { width: 100%; margin-top: 10px; padding: 12px; font-size: 0.9rem; border-radius: 8px; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="header-box">
    <div class="row">
        <select id="jobSelect" onchange="changeJob()"></select>
        <button class="btn-job" onclick="createNewJob()">+ Job</button>
        <button class="btn-dark" onclick="toggleDark()">🌓</button>
    </div>
    <div class="row">
        <select id="currencySelect" class="currency-select" onchange="updateCurrency(this.value)">
            <option value="kr">kr</option>
            <option value="€">€</option>
            <option value="£">£</option>
            <option value="$">$</option>
            <option value="CHF">CHF</option>
        </select>
        <input type="number" id="wageInput" class="wage-input" placeholder="Løn" oninput="updateWage(this.value)">
        <button class="btn-mode" id="modeWeekly" onclick="setMode('weekly')">Ugentlig</button>
        <button class="btn-mode" id="modeCustom" onclick="setMode('custom')">Liste</button>
    </div>
    <div class="row">
        <button onclick="exportCSV()" style="background:#334155; color:white; flex:1">📤 CSV</button>
        <button onclick="saveFullBackup()" style="background:#059669; color:white; flex:1">💾 Backup</button>
        <button onclick="document.getElementById('restorePicker').click()" style="background:#d97706; color:white; flex:1">🔄 Gendan</button>
    </div>
    <input type="file" id="restorePicker" style="display:none;" accept=".json" onchange="restoreFullBackup(event)">
</div>

<div class="container">
    <h3 id="displayTitle" style="margin: 0 0 10px 0; color: var(--primary); text-align: center;">Timeseddel</h3>
    <div id="entries-list"></div>
    
    <button id="addBtnWeekly" class="add-btn" onclick="addNewWeek()" style="display:none; background: var(--primary);">+ Start Ny Uge</button>
    <button id="addBtnCustom" class="add-btn" onclick="addCustomRow()" style="display:none; background: var(--accent);">+ Tilføj Vagt</button>

    <div class="footer">
        <div class="stat-row"><span>Samlet tid:</span> <span id="grandTotal" class="grand-total">0h 0m</span></div>
        <div class="stat-row"><span>Estimeret løn:</span> <span id="grandPay" style="font-weight: 800; color: var(--accent); font-size: 1.3rem;">0.00 kr</span></div>
    </div>
    <button onclick="deleteJob()" style="background:none; color:red; margin-top:20px; font-size:0.6rem; width:100%; opacity:0.3;">Slet dette job permanent</button>
</div>

<script>
    const PASSWORD = "123"; // CHANGE THIS
    const STORAGE_KEY = 'workData_v9';

    function checkAuth() {
        if (sessionStorage.getItem('workAuth') !== 'true') {
            const entry = prompt("Adgangskode:");
            if (entry === PASSWORD) { sessionStorage.setItem('workAuth', 'true'); document.body.style.visibility = "visible"; }
            else { alert("Forkert kode"); window.location.reload(); }
        } else { document.body.style.visibility = "visible"; }
    }
    checkAuth();

    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        currentJob: "Job 1", darkMode: false, currency: "kr",
        jobs: { "Job 1": { mode: 'weekly', wage: 0, weeks: [], custom: [] } }
    };

    const DAYS = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); render(); }

    function toggleDark() { data.darkMode = !data.darkMode; save(); }
    function updateWage(val) { data.jobs[data.currentJob].wage = parseFloat(val) || 0; save(); }
    function updateCurrency(val) { data.currency = val; save(); }
    function setMode(m) { data.jobs[data.currentJob].mode = m; save(); }
    function changeJob() { data.currentJob = document.getElementById('jobSelect').value; save(); }

    function createNewJob() {
        const n = prompt("Job navn:");
        if (n && !data.jobs[n]) {
            data.jobs[n] = { mode: 'weekly', wage: 0, weeks: [], custom: [] };
            data.currentJob = n; save();
        }
    }

    function addNewWeek() {
        const dt = prompt("Startdato (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
        if(!dt) return;
        data.jobs[data.currentJob].weeks.unshift({ startDate: dt, days: DAYS.map(d => ({d, s:'', e:'', b:0})) });
        save();
    }

    function addCustomRow() {
        data.jobs[data.currentJob].custom.push({dt: new Date().toISOString().split('T')[0], s:'', e:'', b:0});
        save();
    }

    function updateWeeklyEntry(wIdx, dIdx, field, val) {
        data.jobs[data.currentJob].weeks[wIdx].days[dIdx][field] = (field==='b')?parseInt(val)||0:val;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        calculateTotals();
    }

    function updateCustomEntry(i, field, val) {
        data.jobs[data.currentJob].custom[i][field] = (field==='b')?parseInt(val)||0:val;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        calculateTotals();
    }

    function render() {
        document.body.className = data.darkMode ? 'dark' : '';
        const job = data.jobs[data.currentJob];
        if(!job) return; 

        document.getElementById('displayTitle').innerText = data.currentJob;
        document.getElementById('wageInput').value = job.wage;
        document.getElementById('currencySelect').value = data.currency;
        
        const sel = document.getElementById('jobSelect');
        sel.innerHTML = '';
        Object.keys(data.jobs).forEach(n => sel.innerHTML += `<option value="${n}" ${n===data.currentJob?'selected':''}>${n}</option>`);

        document.getElementById('modeWeekly').className = `btn-mode ${job.mode==='weekly'?'active':''}`;
        document.getElementById('modeCustom').className = `btn-mode ${job.mode==='custom'?'active':''}`;
        document.getElementById('addBtnWeekly').style.display = job.mode==='weekly'?'block':'none';
        document.getElementById('addBtnCustom').style.display = job.mode==='custom'?'block':'none';

        const listCont = document.getElementById('entries-list');
        listCont.innerHTML = '';

        if(job.mode === 'weekly') {
            job.weeks.forEach((w, wIdx) => {
                let wHtml = `<div class="week-block">
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold; margin-bottom:5px;">
                        <span>Uge af ${w.startDate}</span>
                        <button onclick="deleteWeek(${wIdx})" style="color:red; background:none; font-size:0.6rem;">Fjern</button>
                    </div>`;
                w.days.forEach((day, dIdx) => {
                    wHtml += `<div class="day-row" style="grid-template-columns: 35px 1fr 1fr 45px 55px;">
                        <span style="font-size:0.65rem; font-weight:bold;">${day.d}</span>
                        <input type="time" value="${day.s}" oninput="updateWeeklyEntry(${wIdx},${dIdx},'s',this.value)">
                        <input type="time" value="${day.e}" oninput="updateWeeklyEntry(${wIdx},${dIdx},'e',this.value)">
                        <input type="number" value="${day.b}" oninput="updateWeeklyEntry(${wIdx},${dIdx},'b',this.value)">
                        <span class="day-total-week" data-w="${wIdx}" data-d="${dIdx}">0h</span>
                    </div>`;
                });
                listCont.innerHTML += wHtml + `</div>`;
            });
        } else {
            job.custom.forEach((entry, i) => {
                listCont.innerHTML += `<div class="day-row">
                    <div class="drag-handle">≡</div>
                    <input type="date" value="${entry.dt}" oninput="updateCustomEntry(${i},'dt',this.value)">
                    <input type="time" value="${entry.s}" oninput="updateCustomEntry(${i},'s',this.value)">
                    <input type="time" value="${entry.e}" oninput="updateCustomEntry(${i},'e',this.value)">
                    <input type="number" value="${entry.b}" oninput="updateCustomEntry(${i},'b',this.value)">
                    <span class="day-total-custom" data-idx="${i}">0h</span>
                    <button class="remove-btn" onclick="removeCustomRow(${i})">×</button>
                </div>`;
            });
            Sortable.create(listCont, { handle:'.drag-handle', animation:150, onEnd:(e)=>{
                const c = data.jobs[data.currentJob].custom;
                const item = c.splice(e.oldIndex, 1)[0];
                c.splice(e.newIndex, 0, item); save();
            }});
        }
        calculateTotals();
    }

    function calculateTotals() {
        const job = data.jobs[data.currentJob];
        if(!job) return;
        let totalMin = 0;
        const calc = (s,e,b) => {
            if(!s || !e) return 0;
            const [sh,sm] = s.split(':').map(Number); const [eh,em] = e.split(':').map(Number);
            let start = sh*60+sm; let end = eh*60+em; if(end<start) end+=1440;
            return Math.max(0, (end-start)-(b||0));
        };

        if(job.mode==='weekly') {
            job.weeks.forEach((w, wi) => w.days.forEach((d, di) => {
                let m = calc(d.s, d.e, d.b); totalMin += m;
                const el = document.querySelector(`.day-total-week[data-w="${wi}"][data-d="${di}"]`);
                if(el) el.innerText = (m/60).toFixed(2)+'h';
            }));
        } else {
            job.custom.forEach((e, i) => {
                let m = calc(e.s, e.e, e.b); totalMin += m;
                const el = document.querySelector(`.day-total-custom[data-idx="${i}"]`);
                if(el) el.innerText = (m/60).toFixed(2)+'h';
            });
        }
        document.getElementById('grandTotal').innerText = `${Math.floor(totalMin/60)}h ${totalMin%60}m`;
        document.getElementById('grandPay').innerText = `${((totalMin/60)*job.wage).toFixed(2)} ${data.currency}`;
    }

    function exportCSV() {
        const j = data.jobs[data.currentJob];
        const list = j.mode==='weekly' ? j.weeks.flatMap(w => w.days.map(d=>({dt:w.startDate, ...d}))) : j.custom;
        let csv = "Dato,Job,Ind,Ud,Pause,Timer\n";
        list.forEach(e => {
            if(!e.s || !e.e) return;
            const [sh,sm]=e.s.split(':').map(Number); const [eh,em]=e.e.split(':').map(Number);
            let s=sh*60+sm; let en=eh*60+em; if(en<s) en+=1440;
            let h = ((Math.max(0, (en-s)-(e.b||0)))/60).toFixed(2);
            csv += `${e.dt||''},${data.currentJob},${e.s},${e.e},${e.b},${h}\n`;
        });
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${data.currentJob}.csv`; a.click();
    }

    function saveFullBackup() {
        const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`Backup.json`; a.click();
    }

    function restoreFullBackup(ev) {
        const reader = new FileReader();
        reader.onload = (e) => { try { data = JSON.parse(e.target.result); save(); location.reload(); } catch(err){alert("Fejl");} };
        reader.readAsText(ev.target.files[0]);
    }

    function deleteWeek(i) { if(confirm("Slet?")) { data.jobs[data.currentJob].weeks.splice(i,1); save(); } }
    function removeCustomRow(i) { data.jobs[data.currentJob].custom.splice(i,1); save(); }
    
    // FIXED DELETE JOB LOGIC
    function deleteJob() { 
        if(confirm("Slet dette job permanent?")) { 
            delete data.jobs[data.currentJob]; 
            const remainingJobs = Object.keys(data.jobs);
            if(remainingJobs.length === 0) {
                // If no jobs left, reset to clean state
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            } else {
                data.currentJob = remainingJobs[0];
                save(); 
            }
        } 
    }

    render();
</script>
</body>
</html>
